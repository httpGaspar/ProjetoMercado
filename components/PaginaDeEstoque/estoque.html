<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <header>
        <img src="/assets/logo-merc.png" class="logoImg" alt="imgLogo">
    </header>
    
    <div>
        <p class="texto"><strong>Pesquisar produtos:</strong></p>
        <input class="pesquisa" type="text">

        <button class="adicionar">Adicionar Itens</button>
    </div>
    
    <table id="estoque">
        <thead>
            <tr>
                <th>Nome do Produto:</th>
                <th>Código:</th>
                <th>NCM:</th>
                <th>Quantidade Disponivel:</th>
                <th>Valor:</th>
            </tr>
        </thead>
        <tbody>
            <!-- Linhas de produtos serão inseridas aqui -->
        </tbody>
    </table>

    <script src="./estoque.js"></script>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Cadastrar Novo Item</h2>
            <form id="formProduto">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" required>
                <label for="codigo">Código de Barras:</label>
                <input type="text" id="codigo" required>
                <label for="ncm">NCM:</label>
                <input type="text" id="ncm" required>
                <label for="quantidade">Quantidade:</label>
                <input type="number" id="quantidade" required>
                <label for="valor">Valor:</label>
                <input type="number" id="valor" step="0.01" required>
                <button class="botaomodel" type="submit">Cadastrar</button>
            </form>
        </div>
    </div>

</body>
</html>
